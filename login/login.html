<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Bonnes Pièces — Connexion</title>
    <link href="../images/logo-les-bonnes-pieces.png" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="login.js" defer></script> <!-- Sans type="module", elles sont globales par défaut → pas besoin de window -->
</head>
<body>
    <div class="auth-card">
        <div class="brand">🔧 Les Bonnes Pièces</div>
        <div class="brand-sub">Pièces automobiles de qualité — Dakar</div>

        <!-- Onglets Login / Register -->
        <ul class="nav nav-tabs mb-4" id="authTabs">
            <li class="nav-item w-50">
                <button class="nav-link active w-100" id="tab-login" onclick="showTab('login')">Connexion</button>
            </li>
            <li class="nav-item w-50">
                <button class="nav-link w-100" id="tab-register" onclick="showTab('register')">Inscription</button>
            </li>
        </ul>

        <!-- Formulaire Connexion -->
        <div id="form-login">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="login-email" class="form-control" placeholder="vous@email.com">
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" id="login-mdp" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-orange" onclick="login()">Se connecter</button>
        </div>

        <!-- Formulaire Inscription -->
        <div id="form-register" style="display:none">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" id="reg-nom" class="form-control" placeholder="Votre nom">
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="reg-email" class="form-control" placeholder="vous@email.com">
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" id="reg-mdp" class="form-control" placeholder="Minimum 6 caractères">
            </div>
            <button class="btn-orange" onclick="register()">Créer mon compte</button>
        </div>

        <div class="back-link"><a href="../index.html">← Retour au catalogue</a></div>
    </div>
</body>
</html>
